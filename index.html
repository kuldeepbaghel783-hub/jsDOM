<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greeting and Color Boxes</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#f4f4f4;
        text-align:center;
        padding:30px;
    }

    h1{
        margin-bottom:20px;
        color:#333;
    }

    .container{
        max-width:700px;
        margin:auto;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    .boxes{
        display:flex;
        justify-content:center;
        gap:15px;
        margin:20px 0;
        flex-wrap:wrap;
    }

    .box{
        width:120px;
        height:120px;
        border:2px solid #333;
        display:flex;
        justify-content:center;
        align-items:center;
        cursor:pointer;
        font-size:20px;
        font-weight:bold;
        background:white;
        transition:0.3s;
    }

    input{
        padding:10px;
        width:250px;
        border:1px solid #ccc;
        border-radius:5px;
        margin:10px;
    }

    button{
        padding:10px 20px;
       
        background:#007bff;
        color:white;
        border-radius:5px;
        cursor:pointer;
        font-size:16px;
    }

    button:hover{
        background:#0056b3;
    }
</style>
</head>
<body>

<div class="container">

    <h1 id="greeting">Hello</h1>

    <div class="boxes">
        <div class="box" onclick="changeColor(this)">red</div>
        <div class="box" onclick="changeColor(this)">blue</div>
        <div class="box" onclick="changeColor(this)">green</div>
        <div class="box" onclick="changeColor(this)">yellow</div>
    </div>

    <input type="text" id="username" placeholder="Enter your name">

    <button onclick="greetUser()">Greet Me</button>

</div>

<script src="script.js">

   

</script>

</body>
</html>
